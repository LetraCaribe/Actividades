<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Actividades de Español A1</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,300;0,600;0,700;1,300&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
/* ── CONFIG ── */
:root {
  --ink:    #1A1A2E;
  --paper:  #FAFAF7;
  --cream:  #F3F0E8;
  --warm:   #E8E0D0;
  --accent1:#C0392B;
  --accent2:#1D6A8E;
  --accent3:#2D6A4F;
  --gold:   #B8860B;
  --border: #D4CFC4;
  --muted:  #7A7468;
  --r: 10px;
  --serif: 'Fraunces', Georgia, serif;
  --sans: 'DM Sans', sans-serif;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }

body {
  font-family: var(--sans);
  background: var(--paper);
  color: var(--ink);
  min-height: 100vh;
}

/* ── MASTHEAD ── */
.masthead {
  background: var(--ink);
  color: var(--paper);
  padding: 28px 24px 24px;
  position: sticky; top: 0; z-index: 100;
  border-bottom: 3px solid var(--accent1);
}
.masthead-inner { max-width: 780px; margin: 0 auto; display: flex; align-items: center; gap: 14px; }
.masthead-flag {
  font-size: 26px;
  width: 44px; height: 44px;
  background: var(--accent1);
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.masthead-title { font-family: var(--serif); font-size: 20px; font-weight: 600; letter-spacing: -.02em; }
.masthead-sub { font-size: 11px; color: #AAA; letter-spacing: .08em; text-transform: uppercase; margin-top: 2px; }
.student-badge {
  margin-left: auto;
  background: rgba(255,255,255,.1);
  border: 1px solid rgba(255,255,255,.2);
  border-radius: 20px;
  padding: 5px 14px;
  font-size: 12px;
  color: var(--cream);
  cursor: pointer;
  flex-shrink: 0;
}

/* ── MAIN ── */
.main { max-width: 780px; margin: 0 auto; padding: 28px 16px 60px; }

/* ── LOGIN SCREEN ── */
.login-screen {
  min-height: 70vh;
  display: flex; align-items: center; justify-content: center;
}
.login-card {
  background: var(--cream);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 40px 36px;
  max-width: 420px;
  width: 100%;
  text-align: center;
}
.login-icon { font-size: 48px; margin-bottom: 16px; }
.login-title { font-family: var(--serif); font-size: 26px; font-weight: 600; margin-bottom: 8px; }
.login-sub { font-size: 13px; color: var(--muted); margin-bottom: 28px; line-height: 1.6; }
.input-group { display: flex; flex-direction: column; gap: 8px; margin-bottom: 16px; text-align: left; }
.input-group label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .08em; color: var(--muted); }
.inp {
  padding: 12px 14px;
  border: 1.5px solid var(--border);
  border-radius: var(--r);
  font-family: var(--sans);
  font-size: 14px;
  background: white;
  color: var(--ink);
  outline: none;
  transition: border .15s;
}
.inp:focus { border-color: var(--accent2); }
.btn-primary {
  width: 100%;
  padding: 13px;
  background: var(--accent1);
  color: white;
  border: none;
  border-radius: var(--r);
  font-family: var(--sans);
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  transition: opacity .15s;
  letter-spacing: .02em;
}
.btn-primary:hover { opacity: .88; }
.btn-primary:disabled { opacity: .45; cursor: default; }

/* ── ACTIVITY LIST ── */
.section-label {
  font-size: 10px;
  font-weight: 600;
  letter-spacing: .12em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 16px;
  display: flex;
  align-items: center;
  gap: 10px;
}
.section-label::after { content: ''; flex: 1; height: 1px; background: var(--border); }

.activities-grid { display: flex; flex-direction: column; gap: 12px; margin-bottom: 32px; }

.act-card {
  background: white;
  border: 1.5px solid var(--border);
  border-radius: 14px;
  overflow: hidden;
  cursor: pointer;
  transition: transform .15s, box-shadow .15s, border-color .15s;
}
.act-card:hover { transform: translateY(-2px); box-shadow: 0 6px 24px rgba(0,0,0,.08); }
.act-card.done { border-color: var(--accent3); }

.act-card-inner { display: flex; align-items: center; gap: 0; }
.act-card-color { width: 6px; align-self: stretch; flex-shrink: 0; }
.act-card-body { padding: 16px 18px; flex: 1; }
.act-card-level { font-size: 10px; font-weight: 600; letter-spacing: .1em; text-transform: uppercase; margin-bottom: 5px; }
.act-card-title { font-family: var(--serif); font-size: 18px; font-weight: 600; color: var(--ink); margin-bottom: 4px; }
.act-card-sub { font-size: 12px; color: var(--muted); line-height: 1.5; }
.act-card-meta { display: flex; gap: 8px; margin-top: 10px; flex-wrap: wrap; }
.meta-chip { font-size: 11px; padding: 3px 8px; border-radius: 20px; font-weight: 500; }
.act-card-arrow { padding: 0 18px 0 10px; font-size: 20px; color: var(--border); flex-shrink: 0; }
.act-done-badge {
  font-size: 11px; font-weight: 600;
  padding: 3px 10px; border-radius: 20px;
  background: #D8F3DC; color: var(--accent3);
}

/* ── ACTIVITY VIEW ── */
.act-view { display: none; }
.act-view.active { display: block; }

.act-header {
  border-radius: 14px;
  padding: 28px 26px 22px;
  margin-bottom: 20px;
  position: relative;
  overflow: hidden;
}
.act-header::before {
  content: '';
  position: absolute; inset: 0;
  background: repeating-linear-gradient(45deg, transparent, transparent 20px, rgba(255,255,255,.04) 20px, rgba(255,255,255,.04) 40px);
}
.act-header-nivel { font-size: 10px; font-weight: 600; letter-spacing: .12em; text-transform: uppercase; opacity: .8; margin-bottom: 8px; }
.act-header-title { font-family: var(--serif); font-size: 26px; font-weight: 700; color: white; margin-bottom: 6px; line-height: 1.2; }
.act-header-sub { font-size: 13px; color: rgba(255,255,255,.75); }

.back-btn {
  display: inline-flex; align-items: center; gap: 6px;
  font-size: 12px; font-weight: 500;
  color: var(--muted);
  background: none; border: none;
  cursor: pointer;
  padding: 8px 0;
  margin-bottom: 16px;
  transition: color .15s;
}
.back-btn:hover { color: var(--ink); }

/* VOCAB */
.vocab-bar {
  background: var(--cream);
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: 12px 16px;
  margin-bottom: 18px;
  display: flex; flex-wrap: wrap; gap: 6px; align-items: center;
}
.vocab-label { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: .08em; color: var(--muted); }
.vocab-chip { font-size: 12px; padding: 3px 9px; border-radius: 20px; font-weight: 500; }

/* TEXT BLOCK */
.text-block {
  background: white;
  border: 1.5px solid var(--border);
  border-radius: 14px;
  padding: 24px 26px;
  margin-bottom: 20px;
}
.text-block-label { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: .1em; color: var(--muted); margin-bottom: 14px; }
.reading-text { font-family: var(--serif); font-size: 15px; line-height: 2; color: var(--ink); }
.reading-text p { margin-bottom: 12px; }
.reading-text p:last-child { margin-bottom: 0; }
.hl-ser { font-weight: 700; padding: 0 3px; border-radius: 3px; }
.hl-adj { font-weight: 600; padding: 1px 6px; border-radius: 20px; font-size: 14px; }
.hl-name { font-weight: 700; font-style: italic; }
.speaker { display: inline-block; font-size: 11px; font-weight: 700; padding: 2px 9px; border-radius: 6px; margin-right: 4px; color: white; }
.hl-combo { font-weight: 700; padding: 1px 5px; border-radius: 4px; border-bottom: 2px solid; }
.fecha-tag { font-size: 11px; font-weight: 700; padding: 2px 8px; border-radius: 5px; display: inline-block; vertical-align: middle; }

/* QUESTIONS */
.questions-block {
  background: white;
  border: 1.5px solid var(--border);
  border-radius: 14px;
  padding: 24px 26px;
  margin-bottom: 20px;
}
.q-item { margin-bottom: 22px; }
.q-item:last-child { margin-bottom: 0; }
.q-row { display: flex; align-items: flex-start; gap: 10px; margin-bottom: 10px; }
.q-num {
  min-width: 24px; height: 24px;
  border-radius: 50%;
  font-size: 11px; font-weight: 700;
  color: white;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; margin-top: 1px;
}
.q-text { font-size: 13.5px; font-weight: 500; flex: 1; line-height: 1.5; }
.q-type-badge { font-size: 9px; font-weight: 600; padding: 2px 7px; border-radius: 10px; flex-shrink: 0; margin-top: 3px; text-transform: uppercase; letter-spacing: .05em; white-space: nowrap; }

.opts { display: flex; flex-direction: column; gap: 6px; padding-left: 34px; }
.opt {
  padding: 9px 14px;
  border-radius: 9px;
  border: 1.5px solid var(--border);
  background: var(--paper);
  cursor: pointer;
  font-family: var(--sans);
  font-size: 13px;
  color: var(--ink);
  text-align: left;
  transition: all .15s;
}
.opt:hover:not(:disabled) { background: var(--cream); border-color: #BBB; }
.opt.selected { border-color: var(--accent2); background: #EBF4FA; font-weight: 500; }
.opt:disabled { cursor: default; }

.open-wrap { padding-left: 34px; display: flex; flex-direction: column; gap: 8px; }
.open-ta {
  width: 100%;
  padding: 10px 13px;
  border-radius: 9px;
  border: 1.5px solid var(--border);
  background: var(--paper);
  font-family: var(--serif);
  font-size: 14px;
  color: var(--ink);
  outline: none;
  resize: none;
  line-height: 1.6;
  transition: border .15s;
}
.open-ta:focus { border-color: var(--accent2); }
.open-ta:disabled { opacity: .7; cursor: default; }
.char-count { font-size: 11px; color: var(--muted); text-align: right; }

/* SUBMIT */
.submit-zone {
  background: var(--cream);
  border: 1.5px solid var(--border);
  border-radius: 14px;
  padding: 22px 24px;
  display: flex; align-items: center; gap: 16px;
  flex-wrap: wrap;
}
.submit-info { flex: 1; min-width: 200px; }
.submit-info strong { font-size: 14px; display: block; margin-bottom: 4px; }
.submit-info span { font-size: 12px; color: var(--muted); }
.btn-submit {
  padding: 12px 28px;
  background: var(--accent3);
  color: white;
  border: none;
  border-radius: var(--r);
  font-family: var(--sans);
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  transition: opacity .15s;
  white-space: nowrap;
}
.btn-submit:hover { opacity: .88; }
.btn-submit:disabled { opacity: .45; cursor: default; }

/* SUCCESS */
.success-card {
  background: #D8F3DC;
  border: 2px solid var(--accent3);
  border-radius: 14px;
  padding: 28px 26px;
  text-align: center;
  margin-bottom: 20px;
}
.success-icon { font-size: 40px; margin-bottom: 12px; }
.success-title { font-family: var(--serif); font-size: 22px; font-weight: 600; color: var(--accent3); margin-bottom: 6px; }
.success-sub { font-size: 13px; color: #2D5A3F; line-height: 1.6; }

/* TOAST */
.toast {
  position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
  background: var(--ink); color: white;
  padding: 10px 20px; border-radius: 20px;
  font-size: 13px; font-weight: 500;
  z-index: 999; opacity: 0;
  transition: opacity .3s;
  pointer-events: none;
  white-space: nowrap;
}
.toast.show { opacity: 1; }

/* UTILS */
.hidden { display: none !important; }
.mt-8 { margin-top: 8px; }
</style>
</head>
<body>

<header class="masthead">
  <div class="masthead-inner">
    <div class="masthead-flag">📖</div>
    <div>
      <div class="masthead-title">Español A1</div>
      <div class="masthead-sub">Actividades interactivas</div>
    </div>
    <div class="student-badge" id="studentBadge" onclick="changeStudent()">Iniciar sesión</div>
  </div>
</header>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<div class="main">

  <!-- ── LOGIN ── -->
  <div class="login-screen" id="loginScreen">
    <div class="login-card">
      <div class="login-icon">🌎</div>
      <div class="login-title">¡Bienvenido!</div>
      <div class="login-sub">Escribe tu nombre para comenzar las actividades de español. Tu profesor podrá ver tus respuestas.</div>
      <div class="input-group">
        <label>Tu nombre completo</label>
        <input class="inp" id="nameInput" type="text" placeholder="Ej: María González" autocomplete="name">
      </div>
      <div class="input-group">
        <label>Tu correo electrónico (opcional)</label>
        <input class="inp" id="emailInput" type="email" placeholder="tucorreo@ejemplo.com">
      </div>
      <button class="btn-primary" id="loginBtn" onclick="login()">Comenzar actividades →</button>
    </div>
  </div>

  <!-- ── ACTIVITY LIST ── -->
  <div id="listScreen" class="hidden">
    <div class="section-label">Actividades disponibles</div>
    <div class="activities-grid" id="actGrid"></div>
  </div>

  <!-- ── ACTIVITY VIEWS (rendered dynamically) ── -->
  <div id="activityArea"></div>

</div>

<script>
// ══════════════════════════════════════════════════
//  ⚙️  CONFIGURACIÓN — reemplaza con tus valores
//  Project Settings → API en el Dashboard de Supabase
// ══════════════════════════════════════════════════
const SUPABASE_URL  = 'https://vencsnzxqsjswefpgmfj.supabase.co/rest/v1/';
const SUPABASE_ANON = 'sb_publishable_hyfZJ--ibCa9-Bm3b_iqLg_7KFPSv_B';
// ══════════════════════════════════════════════════

const { createClient } = supabase;
const db = createClient(SUPABASE_URL, SUPABASE_ANON);

// ── STATE ──
let currentStudent = null;   // { id, name }
let currentSession = null;   // session UUID
let completedActivities = new Set(JSON.parse(localStorage.getItem('completed') || '[]'));

// ── ACTIVITY DATA ──
const ACTIVITIES = [
  {
    slug: 'cartagena',
    title: 'Cartagena de Indias',
    sub: 'Descripción de la ciudad · Verbo SER',
    color: '#B5450B', light: '#FDF0E8', dark: '#7A2D07', mid: '#E8A87C',
    vocab: ['hermosa','histórica','colorida','calurosa','acogedora','alegre','colonial','mágica','vibrante','famosa','antigua','tropical'],
    text: [
      `<n>Cartagena de Indias</n> <s>es</s> una ciudad de Colombia. <s>Es</s> una de las ciudades más <a>hermosas</a> de América Latina. <s>Es</s> muy <a>famosa</a> en todo el mundo por su historia y su arquitectura.`,
      `La ciudad vieja <s>es</s> muy <a>antigua</a> y <a>colonial</a>. Las calles <s>son</s> estrechas y <a>coloridas</a>. Las casas <s>son</s> de colores brillantes: amarillo, azul, rosa y verde. <s>Es</s> como caminar dentro de un cuadro de pintura.`,
      `El clima de Cartagena <s>es</s> muy <a>caluroso</a> y <a>tropical</a>. La temperatura <s>es</s> de aproximadamente treinta grados todo el año. El mar Caribe <s>es</s> azul y transparente. Las playas <s>son</s> largas y <a>hermosas</a>.`,
      `La gente de Cartagena <s>es</s> muy <a>amable</a> y <a>acogedora</a>. Los cartageneros <s>son</s> <a>alegres</a> y <a>cariñosos</a> con los turistas. La música y el baile <s>son</s> parte importante de la cultura. La cumbia y el vallenato <s>son</s> los ritmos más populares.`,
      `La comida de Cartagena <s>es</s> deliciosa. El pescado frito y el arroz con coco <s>son</s> los platos más típicos. Los mercados <s>son</s> <a>coloridos</a> y <a>vibrantes</a>. Las frutas tropicales <s>son</s> dulces y frescas.`,
      `La historia de Cartagena <s>es</s> muy <a>rica</a>. Las murallas de la ciudad <s>son</s> <a>antiguas</a> y <a>famosas</a>. El Castillo de San Felipe <s>es</s> una fortaleza <a>histórica</a> muy importante. <s>Es</s> uno de los monumentos más visitados de Colombia.`,
      `Cartagena <s>es</s> una ciudad <a>mágica</a>, <a>romántica</a> y <a>única</a>. <s>Es</s> el lugar perfecto para visitar con la familia o con la pareja. ¡Cartagena <s>es</s> realmente <a>especial</a>!`
    ],
    questions: [
      {n:1, t:'mc', q:'¿Cómo es el clima de Cartagena?', opts:['A) Frío y lluvioso','B) Templado y seco','C) Caluroso y tropical','D) Nublado y húmedo'], ans:2},
      {n:2, t:'mc', q:'¿Cuáles son los ritmos musicales más populares de Cartagena?', opts:['A) El rock y el jazz','B) La cumbia y el vallenato','C) La salsa y la bachata','D) El reggaeton y el pop'], ans:1},
      {n:3, t:'mc', q:'¿Qué monumento histórico hay en Cartagena?', opts:['A) El Palacio de Cristal','B) La Torre Eiffel colombiana','C) El Castillo de San Felipe','D) Las Pirámides del Caribe'], ans:2},
      {n:4, t:'open', q:'¿Cómo son las calles y las casas de la ciudad vieja? Describe con adjetivos del texto.', hint:'Las calles son estrechas y coloridas. Las casas son de colores brillantes.'},
      {n:5, t:'open', q:'¿Cómo es la gente de Cartagena con los turistas? Usa adjetivos del texto.', hint:'La gente de Cartagena es muy amable y acogedora. Son alegres y cariñosos.'},
      {n:6, t:'open', q:'¿Qué platos típicos de Cartagena menciona el texto? Escribe una oración.', hint:'El pescado frito y el arroz con coco son los platos más típicos.'},
    ]
  },
  {
    slug: 'familia',
    title: 'Mi familia',
    sub: 'Carlos describe a su familia · Verbo SER',
    color: '#2D6A9F', light: '#E3F0FB', dark: '#0A3560', mid: '#89BBE5',
    vocab: ['amable','dulce','terco','amoroso','cariñoso','inteligente','trabajador','simpático','serio','alegre','tímido','generoso','paciente','curioso','divertido'],
    text: [
      `Me llamo <n>Carlos</n> y tengo veintidós años. Quiero presentarte a mi familia. <s>Somos</s> cinco personas en casa y todos <s>somos</s> muy diferentes.`,
      `Mi madre se llama <n>Elena</n>. Ella <s>es</s> muy <a>amable</a> y <a>cariñosa</a>. Siempre tiene una sonrisa para todos. También <s>es</s> muy <a>trabajadora</a>: trabaja en un hospital como enfermera.`,
      `Mi padre se llama <n>Roberto</n>. Él <s>es</s> <a>serio</a> pero también muy <a>generoso</a>. A veces <s>es</s> un poco <a>terco</a> — cuando tiene una idea, no cambia de opinión fácilmente. Pero <s>es</s> muy <a>amoroso</a> con toda la familia.`,
      `Mi hermana mayor se llama <n>Lucía</n>. Ella <s>es</s> <a>inteligente</a> y <a>curiosa</a>. Siempre <s>es</s> la primera en terminar los exámenes. También <s>es</s> muy <a>divertida</a>: cuenta chistes y hace reír a todos.`,
      `Mi hermano pequeño se llama <n>Mateo</n>. Él tiene ocho años y <s>es</s> muy <a>alegre</a> y <a>dulce</a>. Pero también <s>es</s> bastante <a>terco</a> cuando quiere un juguete nuevo. <s>Es</s> el más <a>curioso</a> de la familia.`,
      `Mi abuela se llama <n>Rosa</n>. Ella <s>es</s> la persona más <a>paciente</a> del mundo. <s>Es</s> muy <a>simpática</a> con todos los vecinos. También <s>es</s> muy <a>tímida</a> con las personas nuevas, pero cuando te conoce bien, <s>es</s> muy <a>abierta</a> y <a>cariñosa</a>.`,
      `Mi familia <s>es</s> especial. Todos <s>somos</s> diferentes, pero <s>somos</s> muy unidos. Yo <s>soy</s> muy <a>afortunado</a> de tenerlos.`
    ],
    questions: [
      {n:1, t:'mc', q:'¿Cómo es la madre de Carlos, Elena?', opts:['A) Terca y seria','B) Amable y cariñosa','C) Tímida y generosa','D) Alegre y curiosa'], ans:1},
      {n:2, t:'mc', q:'¿Qué adjetivo describe a Roberto (el padre) de forma negativa?', opts:['A) Generoso','B) Amoroso','C) Terco','D) Serio'], ans:2},
      {n:3, t:'mc', q:'¿Quién es la persona más paciente de la familia?', opts:['A) Elena','B) Lucía','C) Mateo','D) Rosa'], ans:3},
      {n:4, t:'open', q:'¿Cómo es Lucía? Escribe dos adjetivos del texto y una oración completa.', hint:'Lucía es inteligente, curiosa y divertida.'},
      {n:5, t:'open', q:'¿Por qué dice Carlos que su padre es "terco"? Explica con tus palabras.', hint:'Roberto es terco porque cuando tiene una idea, no cambia de opinión fácilmente.'},
      {n:6, t:'open', q:'¿Cómo es la abuela Rosa con personas nuevas? ¿Cómo cambia cuando las conoce?', hint:'Con personas nuevas es tímida, pero cuando las conoce bien es abierta y cariñosa.'},
    ]
  },
  {
    slug: 'cumple',
    title: 'El cumpleaños de Laura',
    sub: 'Pronombres de objeto directo e indirecto',
    color: '#B5177B', light: '#FCE4F3', dark: '#7A0E52', mid: '#E88ACE',
    vocab: ['se lo dije','lo tengo','me lo mandaron','te lo envié','se la compré','dámelo','nos lo explicó','te los traje','se lo dieron','para enviártelo'],
    text: [
      `Hoy es el cumpleaños de mi amiga <n>Laura</n>. <fecha>Cumpleaños</fecha> Quiero hacerle una fiesta sorpresa. Primero llamo a Marcos. <combo>Se lo</combo> digo todo: la hora, el lugar y los planes.`,
      `Mi amiga Sofía quiere comprar un regalo especial. <combo>Se lo</combo> explico con detalle. <combo>Lo</combo> tengo muy claro: a Laura le encantan los libros de viajes. Así que Sofía <combo>se la</combo> compra en la librería del centro.`,
      `También necesito decorar el apartamento. Cuando llego a casa, mi hermana <combo>me los</combo> ayuda a inflar. <combo>Me la</combo> pone en la pared del salón. Todo queda muy bonito.`,
      `Tres días antes, Marcos me escribe un mensaje. <combo>Me lo</combo> manda a las nueve de la mañana. Dice que tiene una idea increíble: contratar a un músico para la fiesta. <combo>Se lo</combo> cuento a todos y les encanta.`,
      `El día antes, preparo una tarjeta especial. Quiero enviársela por correo, pero decido dársela en persona. Para <combo>enviártela</combo> necesito tu dirección, Laura. Mejor así: <combo>te la</combo> doy yo misma en tu fiesta.`,
      `El día del cumpleaños, Laura llega sin saber nada. Cuando entra, todos gritan: «¡Sorpresa!». Laura <combo>lo</combo> ve todo y empieza a llorar de emoción. El músico toca una canción especial. <combo>Se la</combo> dedicamos entre todos.`,
      `Al final de la fiesta, «Te <combo>lo</combo> compré pensando en ti», dice Sofía. «¿<combo>Te lo</combo> dije que era una novela de viajes?» «No, no <combo>me lo</combo> dijiste», responde Laura riendo, «¡pero me encanta!»`
    ],
    questions: [
      {n:1, t:'mc', q:'¿A quién le explica el narrador los planes de la sorpresa primero?', opts:['A) A Sofía','B) A Marcos','C) Al músico','D) A la hermana'], ans:1},
      {n:2, t:'mc', q:'¿Qué regalo compra Sofía para Laura?', opts:['A) Globos y flores','B) Una pancarta','C) Un libro de viajes','D) Una tarjeta especial'], ans:2},
      {n:3, t:'mc', q:'En «te lo compré pensando en ti», ¿a qué se refiere «lo»?', opts:['A) Al apartamento','B) Al músico','C) Al libro','D) Al mensaje'], ans:2},
      {n:4, t:'open', q:'En «Me lo manda a las nueve», ¿quién es el sujeto y qué es «lo»? Explica.', hint:'El sujeto es Marcos y "lo" se refiere al mensaje.'},
      {n:5, t:'open', q:'¿Qué significa «se la compra» en el texto? ¿A quién y qué cosa?', hint:'Sofía le compra la novela (libro de viajes) a Laura.'},
      {n:6, t:'open', q:'¿Por qué el narrador decide no enviar la tarjeta por correo? ¿Qué decide hacer?', hint:'Decide dársela en persona en la fiesta en lugar de enviarla por correo.'},
    ]
  }
];

// ── RENDER HELPERS ──
function parseText(txt, act) {
  const c = act.color, l = act.light, d = act.dark, m = act.mid;
  return txt
    .replace(/<s>(.*?)<\/s>/g,     `<span class="hl-ser" style="color:${c};background:${l}">$1</span>`)
    .replace(/<a>(.*?)<\/a>/g,     `<span class="hl-adj" style="background:${l};color:${d};border:1px solid ${m}">$1</span>`)
    .replace(/<n>(.*?)<\/n>/g,     `<span class="hl-name" style="color:${c}">$1</span>`)
    .replace(/<combo>(.*?)<\/combo>/g, `<span class="hl-combo" style="color:${c};background:${l};border-color:${c}">$1</span>`)
    .replace(/<fecha>(.*?)<\/fecha>/g, `<span class="fecha-tag" style="background:${c};color:white">$1</span>`)
    .replace(/<sp c="([^"]+)">(.*?)<\/sp>/g, `<span class="speaker" style="background:$1">$2</span>`);
}

// ── LOGIN ──
async function login() {
  const name  = document.getElementById('nameInput').value.trim();
  const email = document.getElementById('emailInput').value.trim();
  if (!name) { showToast('Por favor escribe tu nombre.'); return; }

  const btn = document.getElementById('loginBtn');
  btn.disabled = true; btn.textContent = 'Guardando…';

  try {
    const { data, error } = await db.from('students').insert({ name, email: email || null }).select().single();
    if (error) throw error;
    currentStudent = { id: data.id, name: data.name };
    localStorage.setItem('student', JSON.stringify(currentStudent));
    afterLogin();
  } catch(e) {
    console.error(e);
    showToast('Error al conectar. Verifica la configuración de Supabase.');
    btn.disabled = false; btn.textContent = 'Comenzar actividades →';
  }
}

function afterLogin() {
  document.getElementById('loginScreen').classList.add('hidden');
  document.getElementById('listScreen').classList.remove('hidden');
  document.getElementById('studentBadge').textContent = '👤 ' + currentStudent.name;
  renderActivityList();
}

function changeStudent() {
  if (!currentStudent) return;
  if (confirm('¿Quieres cambiar de estudiante?')) {
    currentStudent = null;
    localStorage.removeItem('student');
    location.reload();
  }
}

// ── ACTIVITY LIST ──
function renderActivityList() {
  const grid = document.getElementById('actGrid');
  grid.innerHTML = ACTIVITIES.map(act => {
    const done = completedActivities.has(act.slug);
    return `<div class="act-card ${done?'done':''}" onclick="openActivity('${act.slug}')">
      <div class="act-card-inner">
        <div class="act-card-color" style="background:${act.color}"></div>
        <div class="act-card-body">
          <div class="act-card-level" style="color:${act.color}">${act.slug === 'cumple' ? 'A1 · Pronombres OD/OI' : 'A1 · Verbo SER'}</div>
          <div class="act-card-title">${act.title}</div>
          <div class="act-card-sub">${act.sub}</div>
          <div class="act-card-meta">
            <span class="meta-chip" style="background:${act.light};color:${act.dark}">${act.questions.filter(q=>q.t==='mc').length} opción múltiple</span>
            <span class="meta-chip" style="background:${act.light};color:${act.dark}">${act.questions.filter(q=>q.t==='open').length} respuesta abierta</span>
            ${done ? '<span class="act-done-badge">✓ Completada</span>' : ''}
          </div>
        </div>
        <div class="act-card-arrow">›</div>
      </div>
    </div>`;
  }).join('');
}

// ── OPEN ACTIVITY ──
function openActivity(slug) {
  const act = ACTIVITIES.find(a => a.slug === slug);
  document.getElementById('listScreen').classList.add('hidden');
  const area = document.getElementById('activityArea');

  const vocabChips = act.vocab.map(v =>
    `<span class="vocab-chip" style="background:${act.light};color:${act.dark};border:1px solid ${act.mid}">${v}</span>`
  ).join('');

  const textParas = act.text.map(t => `<p>${parseText(t, act)}</p>`).join('');

  const questionsHtml = act.questions.map((q, i) => {
    const badge = q.t === 'mc'
      ? `<span class="q-type-badge" style="background:${act.light};color:${act.dark}">Opción múltiple</span>`
      : `<span class="q-type-badge" style="background:#FFF8E1;color:#6D4C00">Respuesta abierta</span>`;
    const header = `<div class="q-row">
      <span class="q-num" style="background:${act.color}">${q.n}</span>
      <span class="q-text">${q.q}</span>${badge}
    </div>`;
    if (q.t === 'mc') {
      const opts = q.opts.map((o, oi) =>
        `<button class="opt" data-qi="${i}" data-oi="${oi}" onclick="selectOpt(this,'${act.slug}',${i},${oi})">${o}</button>`
      ).join('');
      return `<div class="q-item" id="qi-${act.slug}-${i}">${header}<div class="opts">${opts}</div></div>`;
    } else {
      return `<div class="q-item" id="qi-${act.slug}-${i}">${header}
        <div class="open-wrap">
          <textarea class="open-ta" id="ota-${act.slug}-${i}" rows="3"
            placeholder="Escribe tu respuesta aquí…"
            oninput="updateChar('${act.slug}',${i},this.value.length)"
            style="border-color:${act.mid}"></textarea>
          <div class="char-count" id="cc-${act.slug}-${i}">0 caracteres</div>
        </div></div>`;
    }
  }).join('');

  area.innerHTML = `
    <button class="back-btn" onclick="backToList()">← Volver a actividades</button>
    <div class="act-header" style="background:${act.color}">
      <div class="act-header-nivel">Nivel A1 · Comprensión lectora</div>
      <div class="act-header-title">${act.title}</div>
      <div class="act-header-sub">${act.sub}</div>
    </div>
    <div class="vocab-bar">
      <span class="vocab-label">Vocabulario:</span>${vocabChips}
    </div>
    <div class="text-block">
      <div class="text-block-label">Texto — Lee con atención</div>
      <div class="reading-text">${textParas}</div>
    </div>
    <div class="questions-block">
      <div class="section-label" style="margin-bottom:18px">Preguntas de comprensión</div>
      ${questionsHtml}
    </div>
    <div class="submit-zone">
      <div class="submit-info">
        <strong>¿Terminaste todas las preguntas?</strong>
        <span>Revisa tus respuestas y haz clic en Enviar. Tu profesor recibirá todo.</span>
      </div>
      <button class="btn-submit" onclick="submitActivity('${act.slug}')">Enviar respuestas ✓</button>
    </div>
    <div class="success-card hidden" id="success-${act.slug}">
      <div class="success-icon">🎉</div>
      <div class="success-title">¡Actividad enviada!</div>
      <div class="success-sub">Tu profesor puede ver tus respuestas. ¡Buen trabajo, ${currentStudent?.name || ''}!</div>
    </div>
  `;
  area.style.display = 'block';
  window.scrollTo({top:0, behavior:'smooth'});
  startSession(act.slug);
}

// Track MC selections
const mcSelections = {};
function selectOpt(btn, slug, qi, oi) {
  const parent = btn.closest('.opts');
  parent.querySelectorAll('.opt').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  if (!mcSelections[slug]) mcSelections[slug] = {};
  mcSelections[slug][qi] = oi;
}

function updateChar(slug, qi, len) {
  document.getElementById(`cc-${slug}-${qi}`).textContent = len + ' caracteres';
}

function backToList() {
  document.getElementById('activityArea').innerHTML = '';
  document.getElementById('listScreen').classList.remove('hidden');
  window.scrollTo({top:0, behavior:'smooth'});
}

// ── SUPABASE: SESSION ──
async function startSession(slug) {
  if (!currentStudent) return;
  const act = ACTIVITIES.find(a => a.slug === slug);
  const mc_total = act.questions.filter(q => q.t === 'mc').length;
  const open_total = act.questions.filter(q => q.t === 'open').length;
  try {
    const { data } = await db.from('sessions').insert({
      student_id: currentStudent.id,
      student_name: currentStudent.name,
      activity_slug: slug,
      total_mc: mc_total,
      total_open: open_total,
      completed: false
    }).select().single();
    currentSession = data?.id;
  } catch(e) { console.error('Session error:', e); }
}

// ── SUPABASE: SUBMIT ──
async function submitActivity(slug) {
  if (!currentStudent) { showToast('Por favor inicia sesión primero.'); return; }
  const act = ACTIVITIES.find(a => a.slug === slug);
  const btn = document.querySelector('.btn-submit');
  btn.disabled = true; btn.textContent = 'Enviando…';

  const rows = [];
  let correctMc = 0;

  act.questions.forEach((q, i) => {
    let answer = '', isCorrect = null;
    if (q.t === 'mc') {
      const sel = mcSelections[slug]?.[i];
      answer = sel !== undefined ? q.opts[sel] : '(sin respuesta)';
      isCorrect = sel === q.ans;
      if (isCorrect) correctMc++;
    } else {
      answer = document.getElementById(`ota-${slug}-${i}`)?.value?.trim() || '(sin respuesta)';
      isCorrect = null; // el profesor revisa
    }
    rows.push({
      student_id: currentStudent.id,
      student_name: currentStudent.name,
      activity_slug: slug,
      question_num: q.n,
      question_text: q.q,
      question_type: q.t,
      answer,
      is_correct: isCorrect
    });
  });

  try {
    const { error } = await db.from('responses').insert(rows);
    if (error) throw error;

    // Update session
    if (currentSession) {
      await db.from('sessions').update({
        score_mc: correctMc,
        completed: true,
        completed_at: new Date().toISOString()
      }).eq('id', currentSession);
    }

    completedActivities.add(slug);
    localStorage.setItem('completed', JSON.stringify([...completedActivities]));
    document.getElementById(`success-${slug}`)?.classList.remove('hidden');
    document.querySelector('.submit-zone').style.display = 'none';
    showToast('¡Respuestas enviadas correctamente!');
  } catch(e) {
    console.error(e);
    showToast('Error al enviar. Verifica tu conexión.');
    btn.disabled = false; btn.textContent = 'Enviar respuestas ✓';
  }
}

// ── TOAST ──
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

// ── INIT ──
const saved = localStorage.getItem('student');
if (saved) {
  try {
    currentStudent = JSON.parse(saved);
    afterLogin();
  } catch(e) { localStorage.removeItem('student'); }
}

document.getElementById('nameInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') login();
});
</script>
